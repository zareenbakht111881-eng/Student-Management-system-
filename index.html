<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-4">

    <h1 class="text-center mb-4">🎓 Student Management System</h1>

    <div class="card p-3 mb-4">
        <h4>Add Student</h4>

        <div class="row">

            <div class="col-md-4 mb-2">
                <input type="text" id="name" class="form-control" placeholder="Student Name">
            </div>

            <div class="col-md-2 mb-2">
                <input type="text" id="roll" class="form-control" placeholder="Roll No">
            </div>

            <div class="col-md-2 mb-2">
                <input type="number" id="marks" class="form-control" placeholder="Marks">
            </div>

            <div class="col-md-2 mb-2">
                <input type="number" id="attendance" class="form-control" placeholder="Attendance %">
            </div>

            <div class="col-md-2 mb-2">
                <button onclick="addStudent()" class="btn btn-primary w-100">
                    Add
                </button>
            </div>

        </div>

    </div>

    <input type="text" id="search" class="form-control mb-3" placeholder="Search Student..." onkeyup="displayStudents()">

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Roll</th>
                <th>Marks</th>
                <th>Attendance</th>
                <th>GPA</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="studentTable"></tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
  </html>
